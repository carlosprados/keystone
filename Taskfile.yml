version: "3"

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  LDFLAGS: -ldflags "-X github.com/carlosprados/keystone/internal/version.Version={{.VERSION}} -X github.com/carlosprados/keystone/internal/version.Commit={{.COMMIT}}"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  clean:
    desc: Remove built binaries
    cmds:
      - rm -f keystone keystonectl keystoneserver

  build:
    desc: Build all project binaries
    cmds:
      - go build {{.LDFLAGS}} ./cmd/keystone
      - go build {{.LDFLAGS}} ./cmd/keystonectl
      - go build {{.LDFLAGS}} ./cmd/keystoneserver

  run:
    desc: Run the Keystone agent
    cmds:
      - go run {{.LDFLAGS}} ./cmd/keystone --http 127.0.0.1:8080 --insecure-skip-verify

  dev:
    desc: Run the Keystone agent with live reload (requires air)
    cmds:
      - air

  demo:
    desc: Run the built-in mock 3-component demo stack (db -> cache -> api)
    cmds:
      - go run {{.LDFLAGS}} ./cmd/keystone --demo --http 127.0.0.1:8080 --insecure-skip-verify

  sign:
    desc: "Generate a dev CA (once) and sign a file (usage: task sign FILE=path/to/recipe.toml)"
    cmds:
      - |
        if [ -z "{{.FILE}}" ]; then
          echo "Usage: task sign FILE=path/to/recipe.toml"
          exit 1
        fi
        ./scripts/dev-sign.sh {{.FILE}}

  demo-signed:
    desc: "Secure demo: sign the example recipe with a dev CA and run the agent verifying it"
    cmds:
      - ./scripts/dev-sign.sh configs/examples/com.keystone.server.recipe.toml
      - task: build
      - |
        echo "Trust material ready. In another shell run the agent securely:"
        echo "  KEYSTONE_TRUST_BUNDLE=configs/trust/ca.pem KEYSTONE_LEAF_CERT=configs/trust/leaf.pem ./keystone --http 127.0.0.1:8080"
        echo "then: ./keystonectl apply configs/examples/plan.toml"

  ctl:
    desc: Build the keystonectl binary
    cmds:
      - go build {{.LDFLAGS}} -o keystonectl ./cmd/keystonectl

  fmt:
    desc: Run go fmt on all files
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet on all files
    cmds:
      - go vet ./...

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  plan-dry:
    desc: "Dry-run a plan application (usage: task plan-dry PLAN=path/to/plan.toml)"
    cmds:
      - |
        if [ -z "{{.PLAN}}" ]; then
          echo "Usage: task plan-dry PLAN=path/to/plan.toml"
          exit 1
        fi
        go run ./cmd/keystone --apply {{.PLAN}} --dry-run --http 127.0.0.1:0 --insecure-skip-verify

  hooks:
    desc: Setup git hooks
    cmds:
      - chmod +x .githooks/pre-commit scripts/setup-git-hooks.sh || true
      - ./scripts/setup-git-hooks.sh
